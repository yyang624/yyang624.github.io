{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  {{ with .Params.date }}<p class="meta">{{ . | time.Format "January 2, 2006" }}</p>{{ end }}
    {{ with .Params.tags }}
    <p class="tags">
      {{ range . }}
        <a href="{{ "/tags/" | relURL }}{{ . | urlize }}/">#{{ . }}</a>
      {{ end }}
    </p>
    {{ end }}
  {{ .Content }}
</article>
{{ end }}
