{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  {{ with .Params.summary }}<p class="meta">{{ . }}</p>{{ end }}

  {{ with .Params.simulation }}
  <div class="sim-container">
    <canvas id="sim-canvas" width="720" height="540"></canvas>
    <div class="sim-controls">
      <button id="sim-pause">Pause</button>
      <button id="sim-reset">Reset</button>
      <label class="sim-speed">
        Speed
        <input id="sim-speed" type="range" min="-2" max="10" step="1" value="1">
        <span id="sim-speed-value">1.00×</span>
      </label>
      <span id="sim-fps" class="sim-fps"></span>
    </div>
    <p id="sim-error" class="sim-error" hidden></p>
  </div>
  <link rel="stylesheet" href="{{ "things/simulation.css" | relURL }}">
  <script type="module" src="{{ printf "things/%s.js" . | relURL }}"></script>
  {{ end }}

  {{ .Content }}

  {{ with .Params.converter }}
  <link rel="stylesheet" href="{{ "things/converter.css" | relURL }}">
  <script defer src="{{ printf "things/%s-converter.js" . | relURL }}"></script>
  {{ end }}
</article>
{{ end }}
